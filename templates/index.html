<!DOCTYPE html>
<html>
<head>
    <title>Smart Parking Sensor</title>
    <meta http-equiv="refresh" content="2">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding-top: 60px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 30px 40px;
            width: 300px;
        }
        h1 {
            font-size: 32px;
            color: #333333;
        }
        .distance {
            font-size: 24px;
            margin: 15px 0;
            color: #007BFF;
        }
        .status {
            font-size: 20px;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
        }
        .occupied {
            background-color: #ff4d4d;
            color: white;
        }
        .not-occupied {
            background-color: #28a745;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Smart Parking Sensors</h1>
    <div class="container">
        <!-- Sensor 1 -->
        <div class="card">
            <h2>Sensor 1</h2>
            <div class="distance">Distance: {{ data.sensor1.distance }}</div>
            {% if data.sensor1.occupied %}
                <div class="status occupied">🚗 Parking Occupied</div>
            {% else %}
                <div class="status not-occupied">🅿️ Not Occupied</div>
            {% endif %}
        </div>

        <!-- Sensor 2 -->
        <div class="card">
            <h2>Sensor 2</h2>
            <div class="distance">Distance: {{ data.sensor2.distance }}</div>
            {% if data.sensor2.occupied %}
                <div class="status occupied">🚗 Parking Occupied</div>
            {% else %}
                <div class="status not-occupied">🅿️ Not Occupied</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
