<!DOCTYPE html>
<html>
<head>
    <title>Parking Sensor Status</title>
    <meta http-equiv="refresh" content="1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding-top: 60px;
        }
        .card {
            display: inline-block;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 40px 60px;
        }
        h1 {
            font-size: 32px;
            color: #333333;
        }
        .distance {
            font-size: 28px;
            margin: 20px 0;
            color: #007BFF;
        }
        .status {
            font-size: 24px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
        }
        .occupied {
            background-color: #ff4d4d;
            color: white;
        }
        .not-occupied {
            background-color: #28a745;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Smart Parking Sensor</h1>
        <div class="distance">Distance: {{ distance }} </div>
        {% if is_occupied %}
            <div class="status occupied">🚗 Parking Occupied</div>
        {% else %}
            <div class="status not-occupied">🅿️ Not Occupied</div>
        {% endif %}
    </div>
</body>
</html>
